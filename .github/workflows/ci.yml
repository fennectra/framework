name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, mbstring, gd
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan
        run: composer analyse

      - name: PHP-CS-Fixer
        run: composer lint

      - name: PHPUnit
        run: composer test
        env:
          DB_DRIVER: sqlite
          SQLITE_DB: ':memory:'
          SECRET_KEY: dGVzdF9zZWNyZXRfa2V5X2Zvcl91bml0X3Rlc3RzX21pbmltdW1fMzJfYnl0ZXM=

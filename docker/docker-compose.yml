# Fennectra Docker Compose
# Usage: docker compose -f vendor/fennectra/framework/docker/docker-compose.yml up -d

services:
  app:
    build:
      context: ../../../..
      dockerfile: vendor/fennectra/framework/docker/Dockerfile.frankenphp
    ports:
      - "${PORT:-8080}:8080"
    env_file: ../../../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fennectra}
      POSTGRES_USER: ${POSTGRES_USER:-fennectra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fennectra}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fennectra}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
